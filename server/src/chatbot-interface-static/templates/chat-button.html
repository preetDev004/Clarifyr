<style>
	@keyframes float {
		0% {
			transform: translateY(0);
		}
		50% {
			transform: translateY(-5px);
		}	
		100% {
			transform: translateY(0);
		}
	}
	@keyframes drop-down {
		0% {
			transform: translateY(0);
			opacity: 1;
		}
		100% {
			transform: translateY(100%);
			opacity: 0;
		}
	}
	@keyframes show-up {
		0% {
			transform: translateY(100%);
			opacity: 0;
		}
		100% {
			transform: translateY(0);
			opacity: 1;
		}
	}
	.clarifyr-open-chat-icon {
		animation: float 3s infinite;
		position: fixed; 
		right: 20px; 
		bottom: 20px;
		cursor: pointer;
		border-radius: 21% 79% 17% 83% / 83% 49% 51% 17% ;
		-webkit-filter: drop-shadow( 0px 3px 6px rgba(255, 255, 255, 0.3));
  		filter: drop-shadow( 0px 3px 6px rgba(255, 255, 255, 0.3));
	}
	.clarifyr-hide-button-animation {
		animation: drop-down 0.5s ease-in-out forwards;
	}
	.clarifyr-show-button-animation {
		animation: show-up 0.5s ease-in-out forwards;
	}
</style>

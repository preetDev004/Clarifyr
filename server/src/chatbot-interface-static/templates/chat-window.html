<style>
    @keyframes stretch-in {
        0% {
            transform: scale(0) translate(100%, 100%);
            transform-origin: bottom right;
        }
        100% {
            transform: scale(1) translate(0, 0);
            transform-origin: bottom right;
        }
    }
    @keyframes stretch-out {
        0% {
            transform: scale(1) translate(0, 0);
            transform-origin: bottom right;
        }
        100% {
            transform: scale(0) translate(100%, 100%);
            transform-origin: bottom right;
        }
    }
    @keyframes pulsate {
        0% {
            transform: scale(1);
        }
        50% {
            transform: scale(1.2);
        }
        100% {
            transform: scale(1);
        }
    }
    .clarifyr-chat-window {
        all: unset;
        position: fixed;
        bottom: 20px;
        right: 20px;
        max-width: 350px;
        width: 90%;
        max-height: 500px;
        height: 90vh;
        background: #fff;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        z-index: 9999 !important;
        transition: all 0.5s;
        display: flex;
        transform: scale(0);
        flex-direction: column;
    }

    .clarifyr-hide-chat-animation {
        animation: unset;
        animation: stretch-out 0.3s ease-in-out forwards;
    }

    .clarifyr-show-chat-animation {
        animation: unset;
        animation: stretch-in 0.3s ease-in-out forwards;
    }

    .clarifyr-chat-header {
        padding: 10px;
        border-bottom: 1px solid #eee;
        border-top-left-radius: 10px;
        border-top-right-radius: 10px;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .clarifyr-chat-body {
        flex: 1;
        overflow-y: hidden;
        padding: 10px;
        display: flex;
        flex-direction: column;
        position: relative;
    }

    .clarifyr-chat-messages-container {
        display: flex;
        flex-direction: column;
        overflow-y: auto;
        flex: 1;
    }

    .clarifyr-chat-messages-container::-webkit-scrollbar {
        display: none;
    }

    .clarifyr-chat-messages {
        display: flex;
        flex-direction: column;
    }

    .clarifyr-chat-input-container {
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
        padding: 10px;
        gap: 10px;
    }

    .clarifyr-chat-header-text {
        font-size: 16px;
        font-weight: 600;
        padding: 4px 10px;
        color: #444;
    }

    .clarifyr-close-chat-button, .clarifyr-end-chat-button {
        cursor: pointer;
        color: #444;
        font-size: 15px;
        margin-right: 5px;
    }

    .clarifyr-chat-input {
        flex: 1;
        padding: 7px 12px;
        border: 1px solid #eee;
        background-color: white;
        color: #444;
        border-radius: 20px;
        outline: none;
        font-size: 15px;
        max-height: 100px;
        resize: none;
        white-space: pre-line;
    }

    .clarifyr-chat-input::-webkit-scrollbar {
        display: none;
    }

    .clarifyr-send-button {
        border: 1px solid #eee;
        background: hsl(222.2 47.4% 11.2%);
        color: #fff;
        border-radius: 50%;
        cursor: pointer;
        outline: none;
        height: 40px;
        width: 40px;
        display: flex;
        justify-content: center;
        align-items: center;
        padding-right: 2px;
        padding-top: 2px;
    }

    .clarifyr-chat-message-bot {
        background: #f1f0f0;
        padding: 10px;
        border-radius: 10px;
        margin: 5px 0;
        width: max-content;
        max-width: 80%;
        word-wrap: break-word;
        border-bottom-left-radius: 0;
    }

    .clarifyr-chat-message-text-bot {
        color: hsl(222.2 47.4% 11.2%);
        font-size: 15px;
    }

    .clarifyr-chat-message-user {
        background: hsl(222.2 47.4% 11.2%);
        padding: 10px;
        border-radius: 10px;
        margin: 5px 0;
        width: max-content;
        max-width: 80%;
        word-wrap: break-word;
        border-bottom-right-radius: 0;
        align-self: flex-end;
    }

    .clarifyr-chat-message-text-user {
        color: #fff;
        font-size: 15px;
    }

    .clarifyr-typing-container {
        display: flex;
        align-items: center;
        gap: 5px;
    }

    .clarifyr-typing-dot {
        width: 8px;
        height: 8px;
        background: hsl(222.2 47.4% 11.2%);
        border-radius: 50%;
        animation: pulsate 1s infinite;
    }

    .clarifyr-typing-dot:nth-child(2) {
        animation-delay: 0.2s;
    }

    .clarifyr-typing-dot:nth-child(3) {
        animation-delay: 0.4s;
    }

    .clarifyr-chat-disclaimer {
        font-size: 11px;
        color: #777;
        margin-bottom: 10px;
        text-align: center;
        font-style: italic;
    }

    .clarifyr-chat-header-logo {
        width: 30px;
        height: 30px;
    }

    .clarifyr-chat-header-buttons {
        display: flex;
        gap: 5px;
    }

    .clarifyr-chat-header-left {
        display: flex;
        align-items: center;
        gap: 5px;
    }

    .clarifyr-end-chat-confirmation {
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 100%;
        border-bottom: 1px solid #eee;
    }

    .clarifyr-end-chat-confirmation-text {
        font-size: 15px;
        font-weight: 600;
        color: #444;
        overflow: hidden;
    }
    
    .clarifyr-end-chat-confirmation-buttons {
        display: flex;
        gap: 10px;
        padding-bottom: 10px;
    }
    
    .clarifyr-end-chat-confirmation-button {
        display: flex;
        gap: 10px;
        width: 100%;
        justify-content: center;
        align-items: center;
        flex: 1;
    }
    
    .clarifyr-end-chat-confirmation-button button {
        padding: 5px 10px;
        font-size: 15px;
        border-radius: 5px;
        border: 1px solid #eee;
        background: #fff;
        color: #444;
    }

    .clarifyr-end-chat-confirmation-text-sub {
        font-size: 12px;
        color: #777;
        margin-bottom: 10px;
        text-align: center;
        font-style: italic;
    }
</style>
<div class="clarifyr-chat-window">
    <div class="clarifyr-chat-header">

                </svg>
            </div>
            <div class="clarifyr-chat-header-text">{{BOT_NAME}}</div>
        </div>
        <div class="clarifyr-chat-header-buttons">
            <div class="clarifyr-close-chat-button">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none">
                    <path fill-rule="evenodd" clip-rule="evenodd" d="M4.29289 8.29289C4.68342 7.90237 5.31658 7.90237 5.70711 8.29289L12 14.5858L18.2929 8.29289C18.6834 7.90237 19.3166 7.90237 19.7071 8.29289C20.0976 8.68342 20.0976 9.31658 19.7071 9.70711L12.7071 16.7071C12.3166 17.0976 11.6834 17.0976 11.2929 16.7071L4.29289 9.70711C3.90237 9.31658 3.90237 8.68342 4.29289 8.29289Z" fill="currentColor"/>
                </svg>
            </div>
            <div class="clarifyr-end-chat-button">
                <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width="24"
                    height="24"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                >
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </div>
        </div>
    </div>
    <div class="clarifyr-chat-body">
        <div class="clarifyr-end-chat-confirmation" style="display: none;">
            <div class="clarifyr-end-chat-confirmation-text">Are you sure you want to end the chat?</div>
            <div class="clarifyr-end-chat-confirmation-text-sub">All the messages will be lost.</div>
            <div class="clarifyr-end-chat-confirmation-buttons">
                <div class="clarifyr-end-chat-confirmation-button">
                    <button>Yes</button>
                </div>
                <div class="clarifyr-end-chat-confirmation-button">
                    <button>No</button>
                </div>
            </div>
        </div>
        <div class="clarifyr-chat-messages-container">
            <div class="clarifyr-chat-messages" id="clarifyr-chat-messages">
                <div class="clarifyr-chat-disclaimer">
                    The responses are generated by AI and may not be accurate. All the conversations are recorded for training purposes.
                </div>
                <div class="clarifyr-chat-message-bot welcome-message">
                    <div class="clarifyr-chat-message-text-bot">
                        {{WELCOME_MESSAGE}}
                    </div>
                </div>
            </div>

            <div
                class="clarifyr-chat-message-bot"
                id="clarifyr-typing-message"
                style="display: none"
            >
                <div class="clarifyr-typing-container">
                    <div class="clarifyr-typing-dot"></div>
                    <div class="clarifyr-typing-dot"></div>
                    <div class="clarifyr-typing-dot"></div>
                </div>
            </div>
        </div>
        <div class="clarifyr-chat-input-container">
            <textarea
                type="text"
                class="clarifyr-chat-input"
                placeholder="Type a message"
                wrap="hard"
            >
            </textarea>
            <button class="clarifyr-send-button" onclick="sendMessage()">
                <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width="18"
                    height="18"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    class="lucide lucide-send"
                >
                    <path d="m22 2-7 20-4-9-9-4Z" />
                    <path d="M22 2 11 13" />
                </svg>
            </button>
        </div>
    </div>
</div>
